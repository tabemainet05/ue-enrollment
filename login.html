<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>University of the East • Student Enrollment System</title>
<style>
:root{
  --brand:#cf0a0a;--text:#0f172a;--muted:#64748b;
  --danger:#dc2626;--success:#16a34a;
  --card:rgba(255,255,255,0.97);--radius:20px;
  --shadow:0 25px 60px rgba(0,0,0,.25);
  --font:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;
  padding:20px 16px;
  background:linear-gradient(rgba(0,0,0,.58),rgba(0,0,0,.58)),
    url("https://www.ue.edu.ph/mla/wp-content/uploads/2023/04/uesocialogp.png")
    center/cover no-repeat fixed;
}
body::before{content:"";position:fixed;inset:0;backdrop-filter:blur(5px);z-index:-1;}
.layout{
  max-width:1060px;width:100%;
  display:grid;grid-template-columns:1.15fr .85fr;
  gap:28px;align-items:center;
}
.brand{padding:20px;color:#fff;}
.logo{
  width:88px;height:88px;border-radius:22px;
  background:var(--brand);display:grid;place-items:center;
  margin-bottom:22px;box-shadow:0 16px 38px rgba(207,10,10,.45);overflow:hidden;
}
.logo img{width:100%;height:100%;object-fit:contain;padding:7px;}
h1{font-size:clamp(28px,5vw,48px);line-height:1.05;font-weight:800;}
.subtitle{margin-top:10px;font-size:16px;opacity:.9;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 28px;}
.card h2{font-size:28px;margin-bottom:6px;}
.card p{color:var(--muted);margin-bottom:24px;font-size:14.5px;}
.field{margin-bottom:18px;}
label{display:block;font-weight:600;margin-bottom:8px;font-size:14px;}
.control{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:14px;
  border:1.5px solid #cbd5e1;background:#fff;transition:.15s;
}
.control:focus-within{border-color:var(--brand);box-shadow:0 0 0 4px rgba(207,10,10,.18);}
.control.invalid{border-color:var(--danger);}
.control.valid{border-color:var(--success);}
input{border:none;outline:none;width:100%;font-size:15px;min-width:0;}
.error{margin-top:6px;font-size:12.5px;color:var(--danger);display:none;font-weight:600;}
button{
  width:100%;margin-top:10px;padding:14px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--brand),#ff2d2d);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 12px 28px rgba(207,10,10,.38);
}
button:disabled{opacity:.55;cursor:not-allowed;}
.footer{margin-top:18px;padding-top:14px;border-top:1px solid #e5e7eb;text-align:center;font-size:13px;}
.footer a{color:var(--brand);font-weight:700;text-decoration:none;}

/* Tablet */
@media(max-width:860px){
  .layout{grid-template-columns:1fr;max-width:480px;}
  .brand{text-align:center;padding:10px 20px 0;}
  .logo{margin:0 auto 18px;}
}
/* Phone */
@media(max-width:480px){
  body{padding:28px 12px;align-items:flex-start;}
  .card{padding:24px 18px;}
  .card h2{font-size:22px;}
  h1{font-size:24px;}
  .logo{width:68px;height:68px;}
  .brand{padding:8px 12px 0;}
}
</style>
</head>
<body>
<div class="layout">
  <section class="brand">
    <div class="logo"><img src="University_of_the_East_seal.png" alt="UE Seal"></div>
    <h1>University of the East</h1>
    <div class="subtitle">Student Enrollment System</div>
  </section>
  <section class="card">
    <h2>Welcome Back!</h2>
    <p>Sign in with your UE credentials to continue</p>
    <form id="loginForm" novalidate>
      <div class="field">
        <label>UE Email Address *</label>
        <div class="control" id="emailCtrl">
          <input id="email" type="email" placeholder="name@ue.edu.ph" required autocomplete="email"/>
        </div>
        <div class="error" id="emailErr">Please use your official UE email (@ue.edu.ph)</div>
      </div>
      <div class="field">
        <label>Student Number *</label>
        <div class="control" id="studCtrl">
          <input id="studentNumber" placeholder="Enter your student number" required autocomplete="username"/>
        </div>
        <div class="error" id="studErr">Student number is required</div>
      </div>
      <button id="submitBtn" type="submit" disabled>Sign In to UE Portal</button>
      <div class="footer">Need help? Contact <a href="mailto:registrar@ue.edu.ph">registrar@ue.edu.ph</a></div>
    </form>
  </section>
</div>
<script>
const email=document.getElementById("email"),student=document.getElementById("studentNumber"),
  submitBtn=document.getElementById("submitBtn"),emailCtrl=document.getElementById("emailCtrl"),
  studCtrl=document.getElementById("studCtrl"),emailErr=document.getElementById("emailErr"),
  studErr=document.getElementById("studErr");
function validEmail(){
  const ok=email.value.trim().toLowerCase().endsWith("@ue.edu.ph");
  emailCtrl.classList.toggle("invalid",!ok&&!!email.value);
  emailCtrl.classList.toggle("valid",ok);
  emailErr.style.display=ok||!email.value?"none":"block";return ok;
}
function validStudent(){
  const ok=student.value.trim().length>0;
  studCtrl.classList.toggle("invalid",!ok&&!!student.value);
  studCtrl.classList.toggle("valid",ok);
  studErr.style.display=ok||!student.value?"none":"block";return ok;
}
function validate(){submitBtn.disabled=!(validEmail()&&validStudent());}
email.addEventListener("input",validate);
student.addEventListener("input",validate);
document.getElementById("loginForm").addEventListener("submit",e=>{
  e.preventDefault();validate();if(submitBtn.disabled)return;
  localStorage.setItem("ue_email",email.value.trim());
  localStorage.setItem("ue_studentNumber",student.value.trim());
  window.location.href="dashboard.html";
});
validate();
</script>
</body>
</html>
