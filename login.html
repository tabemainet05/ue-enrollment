<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>University of the East • Student Enrollment System</title>
<style>
:root{
  --brand:#8b0000;
  --brand-mid:#a50000;
  --brand-light:#cf0a0a;
  --text:#fff;
  --muted:rgba(255,255,255,.7);
  --input-bg:rgba(255,255,255,.92);
  --font:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;}
body{
  min-height:100vh;
  font-family:var(--font);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 16px;
  background:
    radial-gradient(ellipse at 30% 20%, #c0392b 0%, #7b0000 40%, #4a0000 100%);
}

/* ── Layout ── */
.layout{
  max-width:1060px;width:100%;
  display:grid;
  grid-template-columns:1.2fr 0.8fr;
  gap:40px;
  align-items:center;
}

/* ── Brand (left) ── */
.brand{
  color:#fff;
  display:flex;flex-direction:column;align-items:flex-start;gap:16px;
}
.logo{
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.12);
  border:3px solid rgba(255,255,255,.3);
  display:grid;place-items:center;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.logo img{width:100%;height:100%;object-fit:contain;padding:8px;}
.brand h1{
  font-size:clamp(26px,4vw,44px);
  font-weight:900;
  line-height:1.05;
  text-shadow:0 2px 8px rgba(0,0,0,.4);
}
.brand .subtitle{
  font-size:15px;
  color:rgba(255,255,255,.8);
  font-weight:500;
}

/* ── Login box ── */
.login-box{
  background:linear-gradient(160deg, #9b1010 0%, #6b0000 60%, #4a0000 100%);
  border:1px solid rgba(255,255,255,.15);
  border-radius:14px;
  padding:28px 24px 22px;
  box-shadow:
    0 24px 60px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.1);
}

/* Fields */
.field{
  margin-bottom:16px;
}
.field label{
  display:block;
  color:#fff;
  font-weight:700;
  font-size:14px;
  margin-bottom:6px;
  text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,.4);
}
.field input{
  width:100%;
  padding:10px 12px;
  border-radius:6px;
  border:2px solid rgba(255,255,255,.25);
  background:var(--input-bg);
  color:#1a0000;
  font-size:15px;
  outline:none;
  transition:.15s;
  font-family:var(--font);
}
.field input:focus{
  border-color:rgba(255,255,255,.7);
  box-shadow:0 0 0 3px rgba(255,255,255,.15);
}
.field .hint{
  text-align:center;
  color:rgba(255,255,255,.65);
  font-size:12px;
  margin-top:5px;
}

/* Error */
.error{
  color:#ffb3b3;
  font-size:12px;
  font-weight:700;
  text-align:center;
  margin-top:5px;
  display:none;
}

/* ── Buttons ── */
.btn-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}
.btn{
  padding:11px 10px;
  border:2px solid rgba(255,255,255,.35);
  border-radius:7px;
  background:rgba(255,255,255,.12);
  color:#fff;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  transition:.15s;
  text-align:center;
  backdrop-filter:blur(4px);
  letter-spacing:.01em;
}
.btn:hover{
  background:rgba(255,255,255,.22);
  border-color:rgba(255,255,255,.55);
}
.btn:active{
  background:rgba(255,255,255,.08);
  transform:scale(.98);
}
.btn:disabled{
  opacity:.45;cursor:not-allowed;
}
.btn.free{
  background:rgba(220,220,220,.18);
}
.btn.block{
  background:rgba(220,220,220,.18);
}

/* footer link */
.box-footer{
  margin-top:16px;
  text-align:center;
  font-size:12px;
  color:rgba(255,255,255,.55);
}
.box-footer a{color:rgba(255,180,180,.9);text-decoration:none;font-weight:700;}

/* ── Responsive ── */
@media(max-width:820px){
  .layout{grid-template-columns:1fr;max-width:420px;gap:24px;}
  .brand{align-items:center;text-align:center;}
}
@media(max-width:480px){
  body{padding:24px 14px;align-items:flex-start;padding-top:32px;}
  .login-box{padding:22px 18px 18px;}
  .brand h1{font-size:24px;}
  .logo{width:80px;height:80px;}
}
</style>
</head>
<body>

<div class="layout">

  <!-- Brand -->
  <section class="brand">
    <div class="logo">
      <img src="University_of_the_East_seal.png" alt="University of the East Seal">
    </div>
    <h1>University of the East</h1>
    <div class="subtitle">Student Enrollment System</div>
  </section>

  <!-- Login Box -->
  <div class="login-box">

    <div class="field">
      <label>Student Number:</label>
      <input id="studentNumber" type="text" placeholder="" autocomplete="username"/>
      <div class="error" id="studErr">Student number is required</div>
    </div>

    <div class="field">
      <label>Access Code:</label>
      <input id="accessCode" type="password" placeholder="" autocomplete="current-password"/>
      <div class="error" id="codeErr">Access code is required</div>
    </div>

    <div class="field">
      <label>Date of Birth:<br><span style="font-weight:500;font-size:12px;">(MM/DD/YYYY)</span></label>
      <input id="dob" type="text" placeholder="" maxlength="10" autocomplete="bday"/>
      <div class="hint">(Ex. 03/31/1980)</div>
      <div class="error" id="dobErr">Please enter a valid date (MM/DD/YYYY)</div>
    </div>

    <div class="btn-row">
      <button class="btn free" id="btnFree">Free Section</button>
      <button class="btn block" id="btnBlock">Block Section</button>
    </div>

    <div class="box-footer">
      Need help? <a href="mailto:registrar@ue.edu.ph">registrar@ue.edu.ph</a>
    </div>
  </div>

</div>

<script>
const studentNumber = document.getElementById("studentNumber");
const accessCode    = document.getElementById("accessCode");
const dob           = document.getElementById("dob");
const btnFree       = document.getElementById("btnFree");
const btnBlock      = document.getElementById("btnBlock");
const studErr       = document.getElementById("studErr");
const codeErr       = document.getElementById("codeErr");
const dobErr        = document.getElementById("dobErr");

// Auto-format DOB as MM/DD/YYYY while typing
dob.addEventListener("input", () => {
  let v = dob.value.replace(/\D/g,"");
  if(v.length > 2) v = v.slice(0,2)+"/"+v.slice(2);
  if(v.length > 5) v = v.slice(0,5)+"/"+v.slice(5,9);
  dob.value = v;
});

function validDOB(val){
  return /^\d{2}\/\d{2}\/\d{4}$/.test(val.trim());
}

function validate(){
  let ok = true;

  if(!studentNumber.value.trim()){
    studErr.style.display="block"; ok=false;
  } else { studErr.style.display="none"; }

  if(!accessCode.value.trim()){
    codeErr.style.display="block"; ok=false;
  } else { codeErr.style.display="none"; }

  if(!validDOB(dob.value)){
    dobErr.style.display="block"; ok=false;
  } else { dobErr.style.display="none"; }

  return ok;
}

function handleLogin(section){
  if(!validate()) return;
  localStorage.setItem("ue_studentNumber", studentNumber.value.trim());
  localStorage.setItem("ue_email", studentNumber.value.trim() + "@ue.edu.ph");
  localStorage.setItem("ue_section_type", section);
  window.location.href = "dashboard.html";
}

btnFree.addEventListener("click",  () => handleLogin("free"));
btnBlock.addEventListener("click", () => handleLogin("block"));

// Clear errors on input
[studentNumber, accessCode, dob].forEach(el =>
  el.addEventListener("input", () => {
    studErr.style.display="none";
    codeErr.style.display="none";
    dobErr.style.display="none";
  })
);
</script>
</body>
</html>
